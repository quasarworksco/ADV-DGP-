<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Factura — DGP Group USA</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon"             href="/favicon.svg" type="image/svg+xml">
  <link rel="shortcut icon"    href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { background:#f1f5f9; font-family:'IBM Plex Sans',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:24px 16px; }
    .pub-card { background:white; max-width:520px; width:100%; border-radius:20px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,0.12); }
    .pub-header-factura { background:linear-gradient(135deg,#0f172a,#1e3a5f); padding:28px 32px 24px; position:relative; }
    .pub-header-recibo  { background:linear-gradient(135deg,#1438cc,#2979ff); padding:28px 32px 24px; position:relative; }
    .pub-brand { font-size:10px; font-weight:600; letter-spacing:4px; text-transform:uppercase; color:rgba(255,255,255,0.5); margin-bottom:6px; }
    .pub-title { font-family:'Bebas Neue',sans-serif; font-size:36px; color:white; letter-spacing:1px; }
    .pub-docnum { font-family:'Bebas Neue',sans-serif; font-size:13px; color:rgba(255,255,255,0.45); margin-top:4px; letter-spacing:2px; }
    .pub-badge { display:inline-flex; align-items:center; gap:5px; background:rgba(255,255,255,0.15); color:white; font-size:10px; font-weight:600; letter-spacing:2px; padding:4px 14px; border-radius:20px; margin-top:12px; }
    .pub-badge::before { content:''; width:6px; height:6px; border-radius:50%; display:block; }
    .pub-badge.pendiente::before { background:#fbbf24; }
    .pub-badge.pagado::before   { background:#34d399; }
    .pub-badge.parcial::before  { background:#fb923c; }
    .pub-zigzag-dark { height:14px; background:linear-gradient(-45deg,white 7px,transparent 0) 0 0,linear-gradient(45deg,white 7px,transparent 0) 0 0; background-color:#1e3a5f; background-size:14px 14px; background-repeat:repeat-x; }
    .pub-zigzag-blue { height:14px; background:linear-gradient(-45deg,white 7px,transparent 0) 0 0,linear-gradient(45deg,white 7px,transparent 0) 0 0; background-color:#2979ff; background-size:14px 14px; background-repeat:repeat-x; }
    .pub-body { padding:24px 32px 0; }
    .pub-meta { display:flex; justify-content:space-between; margin-bottom:18px; padding-bottom:16px; border-bottom:1px dashed #e2e8f0; }
    .pub-meta-col { }
    .pub-meta-label { font-size:9px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:#94a3b8; margin-bottom:3px; }
    .pub-meta-value { font-family:'Bebas Neue',sans-serif; font-size:14px; color:#0a0f1e; }
    .pub-client { border-radius:10px; padding:12px 16px; margin-bottom:18px; }
    .pub-client.dark { background:rgba(15,23,42,0.05); border:1px solid rgba(15,23,42,0.1); }
    .pub-client.blue { background:#eff3ff; border:1px solid rgba(20,56,204,0.12); }
    .pub-client-label { font-size:9px; font-weight:600; letter-spacing:2px; text-transform:uppercase; margin-bottom:3px; }
    .pub-client-label.dark { color:#475569; }
    .pub-client-label.blue { color:#1438cc; }
    .pub-client-name { font-family:'Bebas Neue',sans-serif; font-size:20px; color:#0a0f1e; }
    .pub-nota { background:#fffbeb; border:1px solid rgba(217,119,6,0.2); border-radius:10px; padding:10px 14px; margin-bottom:18px; font-size:12px; color:#92400e; line-height:1.5; }
    .pub-partial { background:#fff7ed; border:1px solid rgba(251,146,60,0.3); border-radius:10px; padding:12px 16px; margin-bottom:18px; display:flex; justify-content:space-between; }
    .pub-partial-col { }
    .pub-partial-label { font-size:9px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:#9a3412; margin-bottom:2px; }
    .pub-partial-value { font-family:'Bebas Neue',sans-serif; font-size:18px; color:#ea580c; }
    .pub-partial-value.paid { color:#059669; }
    table { width:100%; border-collapse:collapse; margin-bottom:4px; }
    thead th { font-size:9px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:#94a3b8; padding:0 0 8px; text-align:left; border-bottom:1px solid #e2e8f0; }
    thead th:last-child { text-align:right; }
    tbody td { padding:9px 0; font-size:12.5px; color:#475569; border-bottom:1px solid #f8fafc; vertical-align:middle; }
    tbody td:last-child { text-align:right; font-weight:600; color:#0a0f1e; }
    tbody tr:last-child td { border-bottom:none; }
    .item-name { font-weight:500; color:#0a0f1e; }
    .item-qty  { font-size:10px; color:#94a3b8; margin-top:1px; }
    .pub-total { margin:0 -32px; padding:18px 32px; display:flex; justify-content:space-between; align-items:center; }
    .pub-total.dark { background:#0a0f1e; }
    .pub-total.blue { background:#1438cc; }
    .pub-total-label { font-size:10px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.55); }
    .pub-total-amount { font-family:'Bebas Neue',sans-serif; font-size:34px; color:white; }
    .pub-footer { padding:16px 32px 24px; text-align:center; }
    .pub-footer p { font-size:11px; color:#94a3b8; line-height:1.6; }
    .pub-footer strong { color:#0a0f1e; }
    .pub-actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 32px 28px; }
    .pub-btn { padding:12px; border-radius:10px; font-family:'IBM Plex Sans',sans-serif; font-size:11px; font-weight:600; letter-spacing:1px; cursor:pointer; transition:all 0.2s; border:1.5px solid; text-align:center; }
    .pub-btn.print { background:#eff3ff; color:#1438cc; border-color:rgba(20,56,204,0.2); }
    .pub-btn.print:hover { background:rgba(20,56,204,0.12); }
    .pub-btn.wa { background:#dcfce7; color:#15803d; border-color:rgba(5,150,105,0.25); }
    .pub-btn.wa:hover { background:#bbf7d0; }
    .pub-loading { padding:60px 32px; text-align:center; color:#94a3b8; font-size:14px; }
    .pub-error { padding:60px 32px; text-align:center; }
    .pub-error div:first-child { font-size:40px; margin-bottom:12px; }
    .pub-error p { color:#475569; font-size:13px; }
    .pub-terms { border-top:2px dashed #e2e8f0; margin:0 32px; padding:20px 0 4px; }
    .pub-terms-title { font-size:9px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:#94a3b8; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
    .pub-terms-title::after { content:''; flex:1; height:1px; background:#e2e8f0; }
    .pub-term-item { display:flex; gap:10px; margin-bottom:10px; font-size:11px; color:#475569; line-height:1.5; }
    .pub-term-num { font-weight:700; color:#1438cc; flex-shrink:0; font-size:11px; }
    .pub-terms-section { margin-top:14px; padding-top:12px; border-top:1px solid #f1f5f9; }
    .pub-terms-section-title { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#0a0f1e; margin-bottom:8px; }
    .pub-terms-contact { background:#f8fafc; border-radius:10px; padding:12px 16px; margin:16px 32px 0; display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px; }
    .pub-terms-contact-col { font-size:11px; color:#475569; }
    .pub-terms-contact-col strong { display:block; font-size:9px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:#94a3b8; margin-bottom:2px; }
    .pub-terms-accept { text-align:center; padding:12px 32px 24px; font-size:10px; color:#94a3b8; line-height:1.6; font-style:italic; }
    .pub-pago { margin:0 32px 0; padding:20px 0 0; }
    .pub-pago-title { font-size:9px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:#94a3b8; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
    .pub-pago-title::after { content:''; flex:1; height:1px; background:#e2e8f0; }
    .pub-pago-card { background:#f8fafc; border:1px solid #e2e8f0; border-radius:12px; padding:16px 18px; margin-bottom:14px; }
    .pub-pago-metodo { font-size:13px; font-weight:600; color:#0a0f1e; margin-bottom:10px; }
    .pub-pago-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid #f1f5f9; gap:8px; }
    .pub-pago-row:last-child { border-bottom:none; }
    .pub-pago-key { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:#94a3b8; flex-shrink:0; }
    .pub-pago-val { font-size:12px; color:#0a0f1e; font-weight:500; word-break:break-all; text-align:right; }
    .pub-pago-copy { background:none; border:1px solid #e2e8f0; border-radius:6px; padding:3px 8px; font-size:10px; cursor:pointer; color:#1438cc; flex-shrink:0; margin-left:8px; }
    .pub-pago-copy:hover { background:#eff3ff; }
    .pub-comp-wrap { margin:0 32px 20px; }
    .pub-comp-uploaded { background:#f0fdf4; border:1px solid rgba(5,150,105,0.25); border-radius:12px; padding:14px 18px; text-align:center; }
    .pub-comp-uploaded img { width:100%; border-radius:8px; margin-bottom:10px; display:block; }
    .pub-comp-uploaded p { font-size:12px; color:#059669; font-weight:600; }
    .pub-comp-area { border:2px dashed #e2e8f0; border-radius:12px; padding:24px; text-align:center; cursor:pointer; transition:all 0.2s; }
    .pub-comp-area:hover { border-color:#1438cc; background:#eff3ff; }
    .pub-comp-area input { display:none; }
    .pub-comp-icon { font-size:28px; margin-bottom:8px; }
    .pub-comp-txt { font-size:13px; font-weight:600; color:#475569; }
    .pub-comp-sub { font-size:11px; color:#94a3b8; margin-top:4px; }
    .pub-comp-progress { height:4px; background:#e2e8f0; border-radius:2px; margin-top:12px; overflow:hidden; display:none; }
    .pub-comp-bar { height:100%; background:#1438cc; border-radius:2px; width:0; transition:width 0.3s; }
    .pub-comp-ok { background:#f0fdf4; border:1px solid rgba(5,150,105,0.2); border-radius:12px; padding:12px; text-align:center; font-size:12px; color:#059669; font-weight:600; display:none; margin-top:10px; }
    @media (max-width:560px) {
      .pub-pago { margin:0 20px 0; }
      .pub-comp-wrap { margin:0 20px 20px; }
    }
    @media (max-width:560px) {
      .pub-terms { margin:0 20px; }
      .pub-terms-contact { margin:16px 0 0; border-radius:0; }
      .pub-terms-accept { padding:12px 20px 24px; }
    }
      body { background:white; padding:0; }
      .pub-card { border-radius:0; box-shadow:none; max-width:100%; }
      .pub-actions { display:none; }
      .pub-header-factura, .pub-header-recibo, .pub-total { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    }
    @media (max-width:560px) {
      body { padding:0; }
      .pub-card { border-radius:0; min-height:100vh; }
      .pub-actions { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
<div class="pub-card" id="pub-card">
  <div class="pub-loading" id="pub-loading">
    <div style="font-size:32px;margin-bottom:12px;">⏳</div>
    Cargando factura...
  </div>
</div>

<script>
  const CLOUDINARY_CLOUD_NAME    = 'dgden7fws';
  const CLOUDINARY_UPLOAD_PRESET = 'm87e1jog';

  const firebaseConfig = {
    apiKey:            "AIzaSyAFI1WRnS5VvFKp8sAuYiIsiT_wXdnNMKc",
    authDomain:        "dgp-group.firebaseapp.com",
    projectId:         "dgp-group",
    storageBucket:     "dgp-group.firebasestorage.app",
    messagingSenderId: "492620738391",
    appId:             "1:492620738391:web:e497fdfe134e6e781b5812"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function loadFactura() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const card = document.getElementById('pub-card');

    if (!id) {
      card.innerHTML = `<div class="pub-error"><div>🔍</div><p>No se especificó ninguna factura.<br>Verifica el enlace.</p></div>`;
      return;
    }

    try {
      const snap = await db.collection('documentos').doc(id).get();
      if (!snap.exists) {
        card.innerHTML = `<div class="pub-error"><div>❌</div><p>Factura no encontrada.<br>El enlace puede haber expirado.</p></div>`;
        return;
      }
      const doc = { _fsId: id, ...snap.data() };
      renderFactura(card, doc);
    } catch(e) {
      console.error('Error factura pública:', e.code, e.message);
      const msg = e.code === 'auth/operation-not-allowed'
        ? 'Autenticación anónima no habilitada en Firebase.'
        : e.code === 'permission-denied'
        ? 'Sin permisos para leer el documento.'
        : e.message || 'Error desconocido';
      card.innerHTML = `<div class="pub-error"><div>⚠️</div><p>Error al cargar la factura.<br><small style="color:#94a3b8">${msg}</small></p></div>`;
    }
  }

  function detectServicios(items) {
    const texto = (items || []).map(i => (i.s || '').toLowerCase()).join(' ');
    return {
      web:        /web|sitio|p[áa]gina|landing|desarrollo|dise[ñn]o web/.test(texto),
      redes:      /redes|social|instagram|facebook|contenido|community|manejo/.test(texto),
      ads:        /ads|publicidad|pauta|campa[ñn]a|google ads|meta ads/.test(texto),
      seguidores: /seguidor|follower|crecimiento|seguidores/.test(texto)
    };
  }

  function renderTerminos(doc) {
    const s = detectServicios(doc.items);
    const cliente = esc(doc.cli || '—');

    const terminosEspecificos = [];

    if (s.web) terminosEspecificos.push(`
      <div class="pub-terms-section">
        <div class="pub-terms-section-title">🌐 Sitios Web</div>
        <div class="pub-term-item"><span class="pub-term-num">→</span>Se incluyen 2 rondas de revisión después de la entrega. Una ronda = todos los cambios enviados juntos en un solo mensaje.</div>
        <div class="pub-term-item"><span class="pub-term-num">→</span>El cliente (${cliente}) es responsable de adquirir y gestionar su dominio. El sitio no se activa hasta recibir el 100% del pago.</div>
        <div class="pub-term-item"><span class="pub-term-num">→</span>Todos los planes incluyen 1 mes de mantenimiento gratuito. Planes desde $450 incluyen hosting + mantenimiento por 6 meses o 1 año según el plan.</div>
        <div class="pub-term-item"><span class="pub-term-num">→</span>DGP Group no garantiza posicionamiento SEO, tráfico ni resultados de ventas.</div>
      </div>`);

    if (s.redes) terminosEspecificos.push(`
      <div class="pub-terms-section">
        <div class="pub-terms-section-title">📱 Redes Sociales</div>
        <div class="pub-term-item"><span class="pub-term-num">→</span>Servicio mensual. El cliente debe aprobar el contenido en 48h; de lo contrario se publica según criterio de DGP Group.</div>
        <div class="pub-term-item"><span class="pub-term-num">→</span>Cancelación con 15 días de aviso previo. No hay reembolso del mes en curso.</div>
        <div class="pub-term-item"><span class="pub-term-num">→</span>No se garantizan métricas específicas de engagement, alcance ni ventas.</div>
      </div>`);

    if (s.ads) terminosEspecificos.push(`
      <div class="pub-terms-section">
        <div class="pub-terms-section-title">📣 Publicidad (ADS)</div>
        <div class="pub-term-item"><span class="pub-term-num">→</span>El presupuesto de pauta publicitaria es responsabilidad del cliente y se paga directamente a Meta/Google. DGP Group cobra únicamente la gestión.</div>
        <div class="pub-term-item"><span class="pub-term-num">→</span>No se garantizan ventas, clics, conversiones ni retorno de inversión específico.</div>
      </div>`);

    if (s.seguidores) terminosEspecificos.push(`
      <div class="pub-terms-section">
        <div class="pub-terms-section-title">👥 Seguidores</div>
        <div class="pub-term-item"><span class="pub-term-num">→</span>Garantía de por vida: si los seguidores bajan, se reponen sin costo adicional.</div>
        <div class="pub-term-item"><span class="pub-term-num">→</span>La garantía aplica como reposición, no como devolución de dinero. Si la cuenta del cliente es suspendida o eliminada por la plataforma, la garantía no aplica.</div>
      </div>`);

    return `
      <div class="pub-terms">
        <div class="pub-terms-title">Términos del Servicio</div>
        <div class="pub-term-item"><span class="pub-term-num">1.</span><span>Sin reembolsos. Una vez iniciado el trabajo no se realizan devoluciones bajo ninguna circunstancia.</span></div>
        <div class="pub-term-item"><span class="pub-term-num">2.</span><span>El trabajo no se entrega ni activa hasta recibir el 100% del pago acordado.</span></div>
        <div class="pub-term-item"><span class="pub-term-num">3.</span><span>Cambios fuera del alcance acordado tienen costo adicional y se cotizan antes de ejecutarse.</span></div>
        <div class="pub-term-item"><span class="pub-term-num">4.</span><span>El cliente obtiene licencia de uso del material entregado solo al completar el pago total. DGP Group puede retirar el trabajo si hay saldo pendiente.</span></div>
        <div class="pub-term-item"><span class="pub-term-num">5.</span><span>DGP Group no es responsable por pérdidas indirectas ni por fallas de plataformas de terceros (Meta, Google, etc.).</span></div>
        ${terminosEspecificos.join('')}
      </div>
      <div class="pub-terms-contact">
        <div class="pub-terms-contact-col"><strong>Proveedor</strong>Andrés Espina — DGP Group USA</div>
        <div class="pub-terms-contact-col"><strong>WhatsApp</strong>+1 (239) 823-1738</div>
        <div class="pub-terms-contact-col"><strong>Correo</strong>dgpgroup.usa@gmail.com</div>
      </div>
      <div class="pub-terms-accept">Al realizar el pago, ${cliente} declara haber leído y aceptado los términos anteriores.</div>`;
  }

  const METODO_LABELS = {
    zelle:'💸 Zelle', bizum:'📱 Bizum', usdt:'🔐 USDT TRC20',
    binancepay:'🟡 Binance Pay', bolivares:'🇻🇪 Bolívares Venezolanos',
    paypal:'🅿️ PayPal', westernunion:'🌐 Western Union'
  };
  const CAMPO_LABELS = {
    correo:'Correo / Cuenta', telefono:'Teléfono', wallet:'Dirección Wallet',
    payid:'Pay ID', banco:'Banco', cuenta:'N° de Cuenta', rifci:'RIF / CI',
    nombre:'Beneficiario', pais:'País / Ciudad'
  };

  function renderPago(doc) {
    if (!doc.metodoPago) return '';
    const label  = METODO_LABELS[doc.metodoPago] || doc.metodoPago;
    const info   = doc.infoPago || {};
    const moneda = doc.moneda === 'eur' ? '€' : '$';
    const filas  = Object.entries(info).filter(([,v]) => v).map(([k, v]) => `
      <div class="pub-pago-row">
        <span class="pub-pago-key">${CAMPO_LABELS[k] || k}</span>
        <span style="display:flex;align-items:center;gap:4px">
          <span class="pub-pago-val">${esc(v)}</span>
          <button class="pub-pago-copy" onclick="copiarTexto('${esc(v)}',this)">Copiar</button>
        </span>
      </div>`).join('');
    return `
      <div class="pub-pago">
        <div class="pub-pago-title">Cómo Pagar</div>
        <div class="pub-pago-card">
          <div class="pub-pago-metodo">${label} · <span style="color:#1438cc">${moneda}${(doc.total||0).toFixed(2)}</span></div>
          ${filas}
        </div>
      </div>`;
  }

  function renderComprobante(doc, fsId) {
    if (doc.comprobante_url) {
      return `
        <div class="pub-comp-wrap">
          <div class="pub-comp-uploaded">
            <img src="${esc(doc.comprobante_url)}" alt="Comprobante">
            <p>✅ Comprobante enviado</p>
          </div>
        </div>`;
    }
    return `
      <div class="pub-comp-wrap">
        <div class="pub-comp-area" onclick="document.getElementById('pub-comp-input').click()">
          <div class="pub-comp-icon">📎</div>
          <div class="pub-comp-txt">Subir comprobante de pago</div>
          <div class="pub-comp-sub">JPG, PNG, WebP — máx. 5MB</div>
          <input type="file" id="pub-comp-input" accept="image/*" onchange="subirComprobantePublico(this,'${fsId}')">
          <div class="pub-comp-progress" id="pub-comp-progress">
            <div class="pub-comp-bar" id="pub-comp-bar"></div>
          </div>
        </div>
        <div class="pub-comp-ok" id="pub-comp-ok">✅ ¡Comprobante enviado! El equipo de DGP Group lo revisará pronto.</div>
      </div>`;
  }

  async function subirComprobantePublico(input, fsId) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { alert('La imagen no puede superar 5MB.'); return; }
    const progress = document.getElementById('pub-comp-progress');
    const bar      = document.getElementById('pub-comp-bar');
    progress.style.display = 'block';
    try {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
      formData.append('folder', 'comprobantes');
      formData.append('public_id', `${fsId}_pub_${Date.now()}`);
      const xhr = new XMLHttpRequest();
      xhr.upload.addEventListener('progress', e => {
        if (e.lengthComputable) bar.style.width = Math.round(e.loaded / e.total * 100) + '%';
      });
      const url = await new Promise((resolve, reject) => {
        xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`);
        xhr.onload = () => { const r = JSON.parse(xhr.responseText); xhr.status === 200 ? resolve(r.secure_url) : reject(new Error(r.error?.message)); };
        xhr.onerror = () => reject(new Error('Error de red'));
        xhr.send(formData);
      });
      await db.collection('documentos').doc(fsId).update({ comprobante_url: url });
      progress.style.display = 'none';
      document.getElementById('pub-comp-ok').style.display = 'block';
      document.querySelector('.pub-comp-area').style.display = 'none';
    } catch(e) {
      progress.style.display = 'none';
      alert('Error al subir el comprobante. Intenta de nuevo.');
    }
  }

  function copiarTexto(txt, btn) {
    navigator.clipboard?.writeText(txt).then(() => {
      btn.textContent = '✓';
      setTimeout(() => btn.textContent = 'Copiar', 2000);
    });
  }

  function renderFactura(card, doc) {
    const isParcial = doc.type === 'factura' && !!doc.pagadoParcial && !doc.pagado;
    const isRecibo  = doc.pagado || doc.type === 'recibo';
    const isFactura = !isParcial && !isRecibo;

    const headerClass  = isRecibo ? 'pub-header-recibo' : 'pub-header-factura';
    const zigzagClass  = isRecibo ? 'pub-zigzag-blue'   : 'pub-zigzag-dark';
    const clientStyle  = isRecibo ? 'blue' : 'dark';
    const totalClass   = isRecibo ? 'blue' : 'dark';
    const badgeClass   = isRecibo ? 'pagado' : (isParcial ? 'parcial' : 'pendiente');
    const badgeText    = isRecibo ? 'PAGO CONFIRMADO' : (isParcial ? 'PAGO PARCIAL' : 'PENDIENTE DE PAGO');
    const docTitle     = isRecibo ? 'RECIBO DE PAGO' : 'FACTURA';
    const totalLabel   = isRecibo ? 'Total Pagado' : 'Total a Pagar';

    const items = (doc.items || []).map(it => `
      <tr>
        <td><div class="item-name">${esc(it.s)}</div><div class="item-qty">${it.c > 1 ? `${it.c} unidades × $${it.p.toFixed(2)}` : 'Unidad'}</div></td>
        <td>$${(it.t||0).toFixed(2)}</td>
      </tr>`).join('');

    const parcialBlock = isParcial ? `
      <div class="pub-partial">
        <div class="pub-partial-col"><div class="pub-partial-label">Pagado</div><div class="pub-partial-value paid">$${(doc.montoPagado||0).toFixed(2)}</div></div>
        <div class="pub-partial-col" style="text-align:right"><div class="pub-partial-label">Pendiente</div><div class="pub-partial-value">$${((doc.total||0)-(doc.montoPagado||0)).toFixed(2)}</div></div>
      </div>` : '';

    const notaBlock = (isFactura || isParcial) && doc.nota ? `
      <div class="pub-nota"><strong>📌 Instrucciones de pago:</strong><br>${esc(doc.nota)}</div>` : '';

    const waText = encodeURIComponent(
      `Hola, aquí está tu ${docTitle.toLowerCase()} de DGP Group USA:\n${window.location.href}`
    );

    card.innerHTML = `
      <div class="${headerClass}">
        <div class="pub-brand">DGP GROUP USA · dgp-link.com</div>
        <div class="pub-title">${docTitle}</div>
        <div class="pub-docnum">N° ${esc(doc.docId || id)}</div>
        <div class="pub-badge ${badgeClass}">${badgeText}</div>
      </div>
      <div class="${zigzagClass}"></div>
      <div class="pub-body">
        <div class="pub-meta">
          <div class="pub-meta-col"><div class="pub-meta-label">Fecha</div><div class="pub-meta-value">${esc(doc.fecha||'—')}</div></div>
          ${doc.ref && doc.ref !== '—' ? `<div class="pub-meta-col" style="text-align:right"><div class="pub-meta-label">Referencia</div><div class="pub-meta-value" style="font-size:11px;">${esc(doc.ref)}</div></div>` : ''}
        </div>
        <div class="pub-client ${clientStyle}">
          <div class="pub-client-label ${clientStyle}">Cliente</div>
          <div class="pub-client-name">${esc(doc.cli||'—')}</div>
        </div>
        ${notaBlock}
        ${parcialBlock}
        <table>
          <thead><tr><th>Descripción</th><th style="text-align:right">Importe</th></tr></thead>
          <tbody>${items}</tbody>
        </table>
      </div>
      <div class="pub-total ${totalClass}">
        <span class="pub-total-label">${totalLabel}</span>
        <span class="pub-total-amount">$${(doc.total||0).toFixed(2)}</span>
      </div>
      <div class="pub-footer">
        <p>${isRecibo ? '¡Gracias por su preferencia!' : 'Una vez realizado el pago, recibirás tu recibo de confirmación.'}<br><strong>DGP Group USA — Servicios Digitales Profesionales</strong></p>
      </div>
      ${!isRecibo ? renderPago(doc) : ''}
      ${!isRecibo ? renderComprobante(doc, doc._fsId) : ''}
      <div class="pub-actions">
        <button class="pub-btn print" onclick="window.print()">🖨️ Imprimir</button>
        <button class="pub-btn wa" onclick="window.open('https://wa.me/?text=${waText}','_blank')">💬 Compartir</button>
      </div>
      ${renderTerminos(doc)}`;
  }

  loadFactura();
</script>
</body>
</html>
